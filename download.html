<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Il tuo graffito · Digital Graffiti</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap');
:root {
  --black:#080808;--white:#f5f4f0;--spray:#ff3b3b;
  --dim:rgba(245,244,240,0.1);--dim2:rgba(245,244,240,0.04);
  --mono:'Space Mono',monospace;--sans:'Space Grotesk',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:var(--black);color:var(--white);font-family:var(--sans);min-height:100svh;cursor:none;}
#cursor{position:fixed;width:10px;height:10px;border-radius:50%;background:var(--spray);pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:difference;transition:width .15s,height .15s;}
#cursor.big{width:36px;height:36px;}
@media(hover:none){#cursor{display:none;}body{cursor:auto;}}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 28px;
  border-bottom:0.5px solid var(--dim);
  background:rgba(8,8,8,0.88);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
}
.nav-logo{display:flex;align-items:center;color:var(--white);text-decoration:none;}
.nav-logo svg{width:80px;height:auto;}
.nav-back{
  font-family:var(--mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;
  color:rgba(245,244,240,0.38);text-decoration:none;
  display:flex;align-items:center;gap:8px;transition:color .2s;
}
.nav-back:hover{color:var(--white);}
.nav-back::before{content:'←';}

/* MAIN */
main{
  min-height:100svh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:100px 24px 56px;
}

/* STATI */
.state{display:none;flex-direction:column;align-items:center;text-align:center;gap:24px;width:100%;max-width:440px;}
.state.active{display:flex;}

.state-eyebrow{font-family:var(--mono);font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(245,244,240,0.28);}
.state-title{font-size:clamp(28px,6vw,40px);font-weight:700;letter-spacing:-0.025em;line-height:1.05;}
.state-sub{font-size:13px;color:rgba(245,244,240,0.42);line-height:1.68;font-weight:300;max-width:340px;}

/* PREVIEW */
.preview-frame{
  width:100%;max-width:380px;aspect-ratio:4/3;
  border:0.5px solid var(--dim);background:var(--dim2);
  position:relative;overflow:hidden;
}
.preview-frame canvas{width:100%;height:100%;display:block;}

.preview-meta{width:100%;max-width:380px;display:flex;align-items:flex-end;justify-content:space-between;gap:12px;text-align:left;}
.preview-info{display:flex;flex-direction:column;gap:4px;}
.preview-label{font-family:var(--mono);font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(245,244,240,0.25);}
.preview-name{font-size:20px;font-weight:700;letter-spacing:-0.01em;}
.preview-date{font-family:var(--mono);font-size:10px;color:rgba(245,244,240,0.28);margin-top:2px;}

/* PROGRESS */
.progress-wrap{width:100%;max-width:380px;}
.progress-header{display:flex;justify-content:space-between;margin-bottom:10px;}
.progress-label{font-family:var(--mono);font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(245,244,240,0.3);}
.progress-pct{font-family:var(--mono);font-size:9px;color:var(--spray);}
.progress-bar{height:1px;background:var(--dim);overflow:hidden;}
.progress-fill{height:100%;background:var(--spray);width:0%;transition:width .08s linear;}

/* SUCCESS */
.success-check{
  width:64px;height:64px;border-radius:50%;
  border:1.5px solid rgba(48,209,88,0.4);
  display:flex;align-items:center;justify-content:center;
  font-size:24px;color:#30d158;
  animation:pop .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes pop{from{transform:scale(0);opacity:0;}to{transform:scale(1);opacity:1;}}

/* BUTTONS */
.btn-primary{
  display:inline-flex;align-items:center;gap:10px;
  font-family:var(--mono);font-size:11px;letter-spacing:0.12em;text-transform:uppercase;
  color:var(--black);background:var(--white);padding:14px 32px;border-radius:2px;
  border:none;cursor:pointer;text-decoration:none;
  transition:opacity .2s,transform .15s;white-space:nowrap;
}
.btn-primary:hover{opacity:0.86;transform:translateY(-1px);}
.btn-ghost{
  display:inline-flex;align-items:center;gap:10px;
  font-family:var(--mono);font-size:11px;letter-spacing:0.12em;text-transform:uppercase;
  color:var(--white);background:transparent;padding:13px 32px;border-radius:2px;
  border:0.5px solid var(--dim);cursor:pointer;text-decoration:none;
  transition:border-color .2s,transform .15s;white-space:nowrap;
}
.btn-ghost:hover{border-color:rgba(245,244,240,0.38);transform:translateY(-1px);}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}

@media(max-width:480px){
  nav{padding:12px 16px;}
  .nav-logo svg{width:68px;}
  main{padding:80px 16px 40px;}
  .btn-row{flex-direction:column;align-items:stretch;}
  .btn-primary,.btn-ghost{justify-content:center;}
}
</style>

<main>
  <!-- Stato 1: preview opera (viene aperto dopo QR scan) -->
  <div class="state active" id="state-preview">
    <div class="state-eyebrow">La tua opera</div>
    <div class="preview-frame">
      <canvas id="preview-canvas"></canvas>
    </div>
    <div class="preview-meta">
      <div class="preview-info">
        <span class="preview-label">Autore</span>
        <span class="preview-name" id="preview-name">Visitatore #247</span>
        <span class="preview-date" id="preview-date"></span>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-primary" onclick="startDownload()">↓ Scarica</button>
      <a href="gallery.html" class="btn-ghost">Galleria →</a>
    </div>
  </div>

  <!-- Stato 2: download in corso -->
  <div class="state" id="state-downloading">
    <div class="state-eyebrow">Download in corso</div>
    <div class="progress-wrap">
      <div class="progress-header">
        <span class="progress-label">Preparazione file</span>
        <span class="progress-pct" id="progress-pct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    </div>
  </div>

  <!-- Stato 3: completato -->
  <div class="state" id="state-done">
    <div class="success-check">✓</div>
    <h1 class="state-title">Salvato</h1>
    <p class="state-sub">L'opera è nella tua galleria foto. Vuoi aggiungerla all'esposizione?</p>
    <div class="btn-row">
      <a href="gallery.html?add=true" class="btn-primary">+ Aggiungi alla galleria</a>
      <a href="gallery.html" class="btn-ghost">Esplora le opere →</a>
    </div>
  </div>
</main>

<script>
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => { cursor.style.left=e.clientX+'px'; cursor.style.top=e.clientY+'px'; });
document.querySelectorAll('a,button').forEach(el => {
  el.addEventListener('mouseenter', () => cursor.classList.add('big'));
  el.addEventListener('mouseleave', () => cursor.classList.remove('big'));
});

function setState(id) {
  document.querySelectorAll('.state').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function seededRand(seed) {
  let s = seed;
  return () => { s=(s*9301+49297)%233280; return s/233280; };
}

function generatePreview(seed) {
  const canvas = document.getElementById('preview-canvas');
  canvas.width = 380; canvas.height = 285;
  const ctx = canvas.getContext('2d');
  const r = seededRand(seed);
  ctx.fillStyle = `hsl(${Math.floor(r()*360)},${Math.floor(r()*20)+2}%,${Math.floor(r()*6)+3}%)`;
  ctx.fillRect(0,0,380,285);
  const colors = ['#ff3b3b','#0a84ff','#bf5af2','#ff9f0a','#30d158','#ffd60a'];
  for (let i=0;i<Math.floor(r()*5+3);i++) {
    const cx=r()*380,cy=r()*285,rad=r()*80+20;
    const c=colors[Math.floor(r()*colors.length)];
    const ri=parseInt(c.slice(1,3),16),gi=parseInt(c.slice(3,5),16),bi=parseInt(c.slice(5,7),16);
    const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,rad);
    grd.addColorStop(0,`rgba(${ri},${gi},${bi},${r()*0.55+0.25})`);
    grd.addColorStop(1,`rgba(${ri},${gi},${bi},0)`);
    ctx.beginPath();ctx.arc(cx,cy,rad,0,Math.PI*2);ctx.fillStyle=grd;ctx.fill();
    for(let j=0;j<50;j++){const a=r()*Math.PI*2,d=r()*rad;ctx.beginPath();ctx.arc(cx+Math.cos(a)*d,cy+Math.sin(a)*d,r()*2+0.2,0,Math.PI*2);ctx.fillStyle=`rgba(${ri},${gi},${bi},${r()*0.4+0.1})`;ctx.fill();}
  }
}

// Leggi parametri
const params = new URLSearchParams(location.search);
const fromLedwall = params.get('from') === 'ledwall';
const code = params.get('code') || ('DG-2025-0' + (Math.floor(Math.random()*900)+100));
const num = parseInt(code.split('-').pop()) || 247;

// Controlla se c'è uno snapshot reale dal ledwall
const snapshot = fromLedwall ? sessionStorage.getItem('dg-snapshot') : null;

if (snapshot) {
  // Mostra immagine reale
  const canvas = document.getElementById('preview-canvas');
  canvas.width = 380; canvas.height = 285;
  const ctx = canvas.getContext('2d');
  const img = new Image();
  img.onload = () => {
    ctx.drawImage(img, 0, 0, 380, 285);
    // Aggiorna link download con immagine reale
    const dlBtn = document.querySelector('[onclick="startDownload()"]');
    if (dlBtn) dlBtn.dataset.realSnapshot = snapshot;
  };
  img.src = snapshot;
  // Pulisci sessionStorage dopo uso
  sessionStorage.removeItem('dg-snapshot');
} else {
  // Fallback: genera preview con seed
  const seed = Array.from(code).reduce((a,c)=>a+c.charCodeAt(0),0);
  generatePreview(seed);
}

document.getElementById('preview-name').textContent = `Visitatore #${num}`;
document.getElementById('preview-date').textContent = new Date().toLocaleDateString('it-IT',{day:'numeric',month:'long',year:'numeric'});

function startDownload() {
  setState('state-downloading');
  const fill = document.getElementById('progress-fill');
  const pct  = document.getElementById('progress-pct');
  let p = 0;
  const iv = setInterval(() => {
    p += Math.random()*10+3;
    if (p >= 100) {
      p=100; clearInterval(iv);
      setTimeout(() => {
        // Usa snapshot reale se disponibile, altrimenti canvas generato
        const dlBtn = document.querySelector('[onclick="startDownload()"]');
        const realSnap = dlBtn ? dlBtn.dataset.realSnapshot : null;
        const canvas = document.getElementById('preview-canvas');
        const dataUrl = realSnap || canvas.toDataURL('image/png');
        const a = document.createElement('a');
        a.href = dataUrl;
        a.download = `digital-graffiti-${num}.png`;
        a.click();
        setState('state-done');
      }, 300);
    }
    fill.style.width = p+'%';
    pct.textContent = Math.floor(p)+'%';
  }, 70);
}
</script>
