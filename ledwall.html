<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Graffiti — Ledwall</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --black:#080808;--white:#f5f4f0;--spray:#ff3b3b;
  --dim:rgba(245,244,240,0.08);
  --mono:'Space Mono',monospace;--sans:'Space Grotesk',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--black);overflow:hidden;width:100vw;height:100vh;}
canvas{display:block;width:100vw;height:100vh;position:fixed;inset:0;}
#bg-image{position:fixed;inset:0;width:100vw;height:100vh;object-fit:cover;z-index:-1;display:none;}
#calib-pattern{position:fixed;inset:0;width:100vw;height:100vh;z-index:5;display:none;}


/* Save button — bottom right */
#save-bar{
  position:fixed;bottom:56px;right:16px;z-index:20;
  display:flex;flex-direction:column;gap:8px;align-items:flex-end;
}
#ledwall-save-btn{
  font-family:var(--mono);font-size:9px;letter-spacing:0.12em;text-transform:uppercase;
  color:var(--black);background:var(--white);padding:9px 16px;border-radius:2px;
  border:none;cursor:pointer;transition:opacity .2s;white-space:nowrap;
}
#ledwall-save-btn:hover{opacity:0.82;}
/* Tiny status indicator bottom-left */
#ws-status{
  position:fixed;bottom:20px;left:16px;z-index:20;
  display:flex;align-items:center;gap:5px;
  font-family:var(--mono);font-size:8px;letter-spacing:0.1em;text-transform:uppercase;
  color:rgba(245,244,240,0.2);pointer-events:none;
}
#ws-dot{width:4px;height:4px;border-radius:50%;background:#f59e0b;transition:background .3s;}
#ws-dot.connected{background:#30d158;}

/* Corner markers (calibrazione) */
.corner-marker{
  position:fixed;width:28px;height:28px;z-index:20;pointer-events:none;
  transition:border-color .3s,background .3s;
}
.corner-marker.done{background:rgba(48,209,88,0.12);}
#c-tl{top:10px;left:10px;border-top:1.5px solid rgba(245,244,240,0.35);border-left:1.5px solid rgba(245,244,240,0.35);}
#c-tr{top:10px;right:10px;border-top:1.5px solid rgba(245,244,240,0.35);border-right:1.5px solid rgba(245,244,240,0.35);}
#c-bl{bottom:10px;left:10px;border-bottom:1.5px solid rgba(245,244,240,0.35);border-left:1.5px solid rgba(245,244,240,0.35);}
#c-br{bottom:10px;right:10px;border-bottom:1.5px solid rgba(245,244,240,0.35);border-right:1.5px solid rgba(245,244,240,0.35);}
.corner-marker.done{border-color:#30d158 !important;}



/* BG Picker */
#bg-picker{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  display:flex;gap:7px;align-items:center;
  background:rgba(8,8,8,0.7);backdrop-filter:blur(12px);
  padding:8px 12px;border-radius:2px;
  border:0.5px solid var(--dim);z-index:20;
}
.bg-swatch{
  width:20px;height:20px;border-radius:50%;cursor:pointer;
  border:1.5px solid transparent;transition:transform .15s,border-color .15s;
}
.bg-swatch.active{border-color:var(--white);transform:scale(1.2);}

/* Hint */
#hint{
  position:fixed;bottom:20px;right:20px;
  font-family:var(--mono);font-size:9px;letter-spacing:0.08em;text-transform:uppercase;
  color:rgba(245,244,240,0.15);pointer-events:none;z-index:20;
}
</style>
</head>
<body>

<canvas id="c"></canvas>
<img id="bg-image">
<canvas id="calib-pattern"></canvas>

<div class="corner-marker" id="c-tl"></div>
<div class="corner-marker" id="c-tr"></div>
<div class="corner-marker" id="c-bl"></div>
<div class="corner-marker" id="c-br"></div>

    <span id="status-text">in attesa controller…</span>
  </div>
</div>

<div id="save-bar">
  <button id="ledwall-save-btn" onclick="sendSnapshotToController()">↓ Salva graffito</button>
</div>

<div id="ws-status"><div id="ws-dot"></div><span id="ws-text">—</span></div>

<div id="bg-picker">
  <div class="bg-swatch active" data-bg="#080808" style="background:#1a1a1a;border-color:rgba(255,255,255,0.25)"></div>
  <div class="bg-swatch" data-bg="#ffffff" style="background:#fff"></div>
  <div class="bg-swatch" data-bg="#1a1a2e" style="background:#1a1a2e"></div>
  <div class="bg-swatch" data-bg="#2d1b00" style="background:#2d1b00"></div>
  <div class="bg-swatch" data-bg="#0d2818" style="background:#0d2818"></div>
  <div class="bg-swatch" data-bg="#1a0a2e" style="background:#1a0a2e"></div>
</div>

<div id="hint">C — cancella · F11 — fullscreen</div>

<script>
(function(){
  const canvas=document.getElementById('c');
  const ctx=canvas.getContext('2d');
  const dot=document.getElementById('ws-dot');
  const txt=document.getElementById('ws-text');
  const corners=['c-tl','c-tr','c-bl','c-br'].map(id=>document.getElementById(id));

  function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);

  // BG picker
  let currentBg='#080808';
  document.querySelectorAll('.bg-swatch').forEach(s=>{
    s.addEventListener('click',()=>{
      document.querySelectorAll('.bg-swatch').forEach(x=>x.classList.remove('active'));
      s.classList.add('active');
      currentBg=s.dataset.bg;
      document.body.style.background=currentBg;
      document.getElementById('bg-image').style.display='none';
      if(ws&&ws.readyState===1) ws.send(JSON.stringify({type:'bg',color:currentBg}));
    });
  });

  // WebSocket
  let ws;
  function connect(){
    ws=new WebSocket(`wss://${location.host}/display`);
    ws.onopen=()=>{dot.classList.add('connected');txt.textContent='connesso';};
    ws.onclose=()=>{dot.classList.remove('connected');txt.textContent='—';setTimeout(connect,2000);};
    ws.onmessage=(e)=>{
      try{
        const msg=JSON.parse(e.data);
        if(msg.type==='spray') drawSpray(msg);
        if(msg.type==='clear') ctx.clearRect(0,0,canvas.width,canvas.height);
        if(msg.type==='calib-pattern') togglePattern(msg.on);
        if(msg.type==='calibrated') showCalibrated();
        if(msg.type==='bg'){
          currentBg=msg.color;
          document.body.style.background=currentBg;
          document.getElementById('bg-image').style.display='none';
          document.querySelectorAll('.bg-swatch').forEach(s=>s.classList.toggle('active',s.dataset.bg===currentBg));
        }
        if(msg.type==='snapshot-request'){
          // Controller chiede screenshot del canvas
          const snap=canvas.toDataURL('image/png');
          if(ws&&ws.readyState===1) ws.send(JSON.stringify({type:'snapshot',data:snap}));
        }
        if(msg.type==='bg-image'){
          document.body.style.background='#080808';
          const img=document.getElementById('bg-image');
          img.src=msg.data;img.style.display='block';
        }
      }catch{}
    };
  }
  connect();

  // Spray rendering
  // Accumula spray per frame batching
  let sprayQueue = [];
  let renderScheduled = false;

  function drawSpray(msg){
    sprayQueue.push(msg);
    if (!renderScheduled) {
      renderScheduled = true;
      requestAnimationFrame(flushSpray);
    }
    txt.textContent='spruzzando…';
    clearTimeout(window._st);
    window._st=setTimeout(()=>{txt.textContent='connesso';},700);
  }

  function flushSpray() {
    renderScheduled = false;
    sprayQueue.forEach(msg => renderSpray(msg));
    sprayQueue = [];
  }

  function renderSpray(msg){
    const cx = msg.x * canvas.width;
    const cy = msg.y * canvas.height;
    const baseRadius = msg.size * Math.min(canvas.width, canvas.height);
    const pressure   = Math.max(0.01, Math.min(1, msg.pressure));
    const [r,g,b]    = msg.color.split(',').map(Number);

    // Parametri calibrati per spray realistico
    const coreRadius  = baseRadius * 0.18;          // nucleo denso
    const midRadius   = baseRadius * 0.55;           // zona media
    const edgeRadius  = baseRadius * (0.7 + pressure * 0.3); // bordo con variazione pressione
    const dpiScale    = window.devicePixelRatio || 1;

    // ── 1. Core — pennellata solida centrale ────────────────────────
    const coreGrd = ctx.createRadialGradient(cx,cy,0, cx,cy, coreRadius);
    coreGrd.addColorStop(0,   `rgba(${r},${g},${b},${0.85 * pressure})`);
    coreGrd.addColorStop(0.6, `rgba(${r},${g},${b},${0.55 * pressure})`);
    coreGrd.addColorStop(1,   `rgba(${r},${g},${b},0)`);
    ctx.beginPath();
    ctx.arc(cx, cy, coreRadius, 0, Math.PI*2);
    ctx.fillStyle = coreGrd;
    ctx.fill();

    // ── 2. Mid halo — transizione morbida ──────────────────────────
    const midGrd = ctx.createRadialGradient(cx,cy, coreRadius*0.5, cx,cy, midRadius);
    midGrd.addColorStop(0,   `rgba(${r},${g},${b},${0.35 * pressure})`);
    midGrd.addColorStop(0.5, `rgba(${r},${g},${b},${0.12 * pressure})`);
    midGrd.addColorStop(1,   `rgba(${r},${g},${b},0)`);
    ctx.beginPath();
    ctx.arc(cx, cy, midRadius, 0, Math.PI*2);
    ctx.fillStyle = midGrd;
    ctx.fill();

    // ── 3. Particelle spray — distribuzione realistica ──────────────
    // Densità alta vicino al centro, sparsa verso i bordi
    const totalParticles = Math.floor(pressure * 160 + 40);

    for (let i = 0; i < totalParticles; i++) {
      // Distribuzione: 60% zona centrale, 40% zona esterna
      const zone = Math.random();
      let dist, particleR, alpha;

      if (zone < 0.6) {
        // Zona centrale — particelle più dense e grandi
        dist      = Math.pow(Math.random(), 1.8) * midRadius;
        particleR = Math.random() * 2.2 + 0.6;
        alpha     = (1 - dist/midRadius) * 0.75 * pressure;
      } else {
        // Zona esterna — particelle fini e sparse (effetto nebbia)
        dist      = midRadius + Math.random() * (edgeRadius - midRadius);
        particleR = Math.random() * 1.2 + 0.2;
        alpha     = (1 - (dist - midRadius)/(edgeRadius - midRadius)) * 0.28 * pressure;
      }

      const angle = Math.random() * Math.PI * 2;
      // Leggera irregolarità ellittica (simula inclinazione bomboletta)
      const jitterX = (Math.random() - 0.5) * 3;
      const jitterY = (Math.random() - 0.5) * 3;
      const px = cx + Math.cos(angle) * dist + jitterX;
      const py = cy + Math.sin(angle) * dist + jitterY;

      if (alpha < 0.01) continue;
      ctx.beginPath();
      ctx.arc(px, py, particleR, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
      ctx.fill();
    }

    // ── 4. Drip effect — solo ad alta pressione ─────────────────────
    if (pressure > 0.75 && Math.random() < 0.15) {
      const dripLen = (Math.random() * 0.4 + 0.1) * baseRadius;
      const dripX   = cx + (Math.random() - 0.5) * coreRadius;
      const dripGrd = ctx.createLinearGradient(dripX, cy, dripX, cy + dripLen);
      dripGrd.addColorStop(0,   `rgba(${r},${g},${b},${0.5 * pressure})`);
      dripGrd.addColorStop(0.7, `rgba(${r},${g},${b},${0.2 * pressure})`);
      dripGrd.addColorStop(1,   `rgba(${r},${g},${b},0)`);
      ctx.beginPath();
      ctx.moveTo(dripX - 1.5, cy);
      ctx.lineTo(dripX + 1.5, cy);
      ctx.lineTo(dripX + 0.8, cy + dripLen);
      ctx.lineTo(dripX - 0.8, cy + dripLen);
      ctx.closePath();
      ctx.fillStyle = dripGrd;
      ctx.fill();
    }
  }

  // Calibration pattern
  function togglePattern(on){
    const pc=document.getElementById('calib-pattern');
    if(!on){pc.style.display='none';return;}
    pc.style.display='block';
    pc.width=window.innerWidth;pc.height=window.innerHeight;
    const pctx=pc.getContext('2d');
    pctx.fillStyle='#ffffff';pctx.fillRect(0,0,pc.width,pc.height);
    const cols=16,rows=Math.round(cols*(pc.height/pc.width));
    const cw=pc.width/cols,ch=pc.height/rows;
    pctx.fillStyle='#000000';
    for(let y=0;y<rows;y++) for(let x=0;x<cols;x++) if((x+y)%2===0) pctx.fillRect(x*cw,y*ch,cw,ch);
    // Corner markers
    [[0,0],[pc.width-cw*2,0],[0,pc.height-ch*2],[pc.width-cw*2,pc.height-ch*2]].forEach(([x,y])=>{
      pctx.fillStyle='#ffffff';pctx.fillRect(x,y,cw*2,ch*2);
      pctx.strokeStyle='#000';pctx.lineWidth=cw*0.12;
      pctx.strokeRect(x+cw*0.1,y+ch*0.1,cw*1.8,ch*1.8);
      pctx.fillStyle='#ff3b3b';
      pctx.beginPath();pctx.arc(x+cw,y+ch,cw*0.18,0,Math.PI*2);pctx.fill();
    });
    // Centro
    pctx.strokeStyle='#ff3b3b';pctx.lineWidth=4;
    for(let rad=30;rad<Math.min(pc.width,pc.height)*0.15;rad+=44){
      pctx.beginPath();pctx.arc(pc.width/2,pc.height/2,rad,0,Math.PI*2);pctx.stroke();
    }
  }

  function showCalibrated(){
    corners.forEach(el=>{el.classList.add('done');setTimeout(()=>el.classList.remove('done'),3000);});
    txt.textContent='calibrazione ricevuta ✓';
    setTimeout(()=>{txt.textContent='controller connesso';},3000);
  }

  // Send snapshot to controller (triggered by ledwall save button)
  window.sendSnapshotToController = function() {
    const snap = canvas.toDataURL('image/png');
    if(ws&&ws.readyState===1) ws.send(JSON.stringify({type:'snapshot',data:snap}));
    // Also trigger download directly from ledwall
    const a=document.createElement('a');
    a.href=snap;
    a.download='digital-graffiti.png';
    a.click();
  };

  // Keyboard
  window.addEventListener('keydown',e=>{
    if(e.key.toLowerCase()==='c'){ctx.clearRect(0,0,canvas.width,canvas.height);if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:'clear'}));}
    if(e.key==='F11')document.documentElement.requestFullscreen?.();
  });
})();
</script>
</body>
</html>
