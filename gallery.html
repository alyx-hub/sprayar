<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galleria · Digital Graffiti</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap');
:root{--black:#080808;--white:#f5f4f0;--spray:#ff3b3b;--dim:rgba(245,244,240,0.1);--dim2:rgba(245,244,240,0.04);--mono:'Space Mono',monospace;--sans:'Space Grotesk',sans-serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--black);color:var(--white);font-family:var(--sans);min-height:100vh;cursor:none;}
#cursor{position:fixed;width:10px;height:10px;border-radius:50%;background:var(--spray);pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:difference;transition:width .15s,height .15s;}
#cursor.big{width:36px;height:36px;}
@media(hover:none){#cursor{display:none;}body{cursor:auto;}}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 28px;
  border-bottom:0.5px solid var(--dim);
  background:rgba(8,8,8,0.9);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
}
.nav-logo{display:flex;align-items:center;color:var(--white);text-decoration:none;}
.nav-logo svg{width:80px;height:auto;}
.nav-links{display:flex;gap:20px;align-items:center;}
.nav-links a{font-family:var(--mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(245,244,240,0.38);text-decoration:none;transition:color .2s;white-space:nowrap;}
.nav-links a:hover{color:var(--white);}
.nav-links a.active{color:var(--white);}
.btn-add{font-family:var(--mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--black);background:var(--white);padding:9px 18px;border-radius:2px;text-decoration:none;border:none;cursor:pointer;transition:opacity .2s;white-space:nowrap;}
.btn-add:hover{opacity:0.82;}
@media(max-width:768px){
  nav{padding:12px 16px;}
  .nav-logo svg{width:68px;}
  .nav-links .hide-mobile{display:none;}
}

/* HEADER */
.gallery-header{
  padding:110px 28px 40px;border-bottom:0.5px solid var(--dim);
  display:flex;align-items:flex-end;justify-content:space-between;gap:32px;flex-wrap:wrap;
}
.gallery-title{font-size:clamp(42px,8vw,96px);font-weight:700;letter-spacing:-0.03em;line-height:0.92;}
.gallery-title em{font-style:normal;color:transparent;-webkit-text-stroke:1.5px var(--white);}
.gallery-meta{text-align:right;display:flex;flex-direction:column;gap:4px;flex-shrink:0;}
.gallery-count{font-family:var(--mono);font-size:40px;font-weight:700;color:var(--spray);line-height:1;}
.gallery-count-label{font-family:var(--mono);font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(245,244,240,0.25);}

/* TOOLBAR */
.toolbar{
  padding:14px 28px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:0.5px solid var(--dim);gap:12px;flex-wrap:wrap;
  position:sticky;top:57px;
  background:rgba(8,8,8,0.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);z-index:50;
}
.sort-tabs{display:flex;gap:2px;}
.sort-tab{
  font-family:var(--mono);font-size:9px;letter-spacing:0.12em;text-transform:uppercase;
  padding:7px 14px;border:0.5px solid transparent;border-radius:2px;
  cursor:pointer;color:rgba(245,244,240,0.35);background:transparent;transition:all .2s;
}
.sort-tab.active{color:var(--white);border-color:var(--dim);background:var(--dim2);}
.sort-tab:hover:not(.active){color:rgba(245,244,240,0.65);}
.view-toggle{display:flex;gap:2px;}
.view-btn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border:0.5px solid transparent;border-radius:2px;cursor:pointer;background:transparent;color:rgba(245,244,240,0.3);transition:all .2s;font-size:13px;}
.view-btn.active{border-color:var(--dim);background:var(--dim2);color:var(--white);}

/* GRID */
.gallery-grid{padding:1px;display:grid;gap:1px;background:var(--dim);}
.gallery-grid.grid-cols-3{grid-template-columns:repeat(3,1fr);}
.gallery-grid.grid-cols-2{grid-template-columns:repeat(2,1fr);}
.gallery-grid.grid-cols-1{grid-template-columns:1fr;}
@media(max-width:600px){
  .gallery-grid.grid-cols-3{grid-template-columns:repeat(2,1fr);}
  .gallery-grid.grid-cols-1{grid-template-columns:1fr;}
  .toolbar{top:53px;padding:10px 16px;}
  .gallery-header{padding:90px 16px 32px;}
}

.grid-item{background:var(--black);aspect-ratio:4/3;position:relative;overflow:hidden;cursor:pointer;}
.grid-item canvas{width:100%;height:100%;display:block;}
.item-overlay{position:absolute;inset:0;background:rgba(8,8,8,0.7);display:flex;flex-direction:column;justify-content:space-between;padding:16px;opacity:0;transition:opacity .2s;}
.grid-item:hover .item-overlay{opacity:1;}
@media(hover:none){.item-overlay{opacity:1;background:linear-gradient(to top,rgba(8,8,8,0.75) 0%,transparent 50%);padding:10px;justify-content:flex-end;}}
.item-author{font-family:var(--mono);font-size:10px;letter-spacing:0.06em;color:var(--white);}
.item-bottom{display:flex;align-items:center;justify-content:space-between;}
.item-date{font-family:var(--mono);font-size:9px;color:rgba(245,244,240,0.38);}
.item-like{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;color:rgba(245,244,240,0.55);cursor:pointer;background:none;border:none;padding:4px;transition:color .2s;}
.item-like:hover,.item-like.liked{color:var(--spray);}
.item-like svg{width:13px;height:13px;}
.item-like.liked svg{fill:var(--spray);}

/* MODAL */
#modal{position:fixed;inset:0;background:rgba(8,8,8,0.94);z-index:200;display:none;align-items:center;justify-content:center;padding:28px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}
#modal.open{display:flex;}
.modal-inner{max-width:600px;width:100%;display:flex;flex-direction:column;gap:16px;}
.modal-canvas-wrap{width:100%;aspect-ratio:4/3;border:0.5px solid var(--dim);overflow:hidden;}
.modal-canvas-wrap canvas{width:100%;height:100%;display:block;}
.modal-meta{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.modal-author{font-size:18px;font-weight:700;letter-spacing:-0.01em;}
.modal-date{font-family:var(--mono);font-size:10px;color:rgba(245,244,240,0.3);margin-top:3px;}
.modal-actions{display:flex;gap:8px;flex-shrink:0;}
.modal-btn{font-family:var(--mono);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;padding:9px 16px;border-radius:2px;cursor:pointer;border:0.5px solid var(--dim);background:transparent;color:rgba(245,244,240,0.55);transition:all .2s;white-space:nowrap;}
.modal-btn:hover{border-color:rgba(245,244,240,0.38);color:var(--white);}
.modal-btn.liked{color:var(--spray);border-color:rgba(255,59,59,0.3);}
.modal-btn.dl{background:var(--white);color:var(--black);border-color:var(--white);}
.modal-close{position:absolute;top:20px;right:20px;font-family:var(--mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(245,244,240,0.28);background:none;border:none;cursor:pointer;padding:8px;transition:color .2s;}
.modal-close:hover{color:var(--white);}

/* UPLOAD */
#upload-panel{position:fixed;inset:0;background:rgba(8,8,8,0.97);z-index:300;display:none;align-items:center;justify-content:center;padding:28px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}
#upload-panel.open{display:flex;}
.upload-inner{max-width:420px;width:100%;display:flex;flex-direction:column;gap:20px;align-items:center;text-align:center;}
.upload-title{font-size:clamp(24px,5vw,32px);font-weight:700;letter-spacing:-0.02em;}
.upload-sub{font-size:13px;color:rgba(245,244,240,0.4);line-height:1.65;font-weight:300;}
.upload-zone{width:100%;aspect-ratio:4/3;border:0.5px dashed rgba(245,244,240,0.18);border-radius:2px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;transition:border-color .2s;position:relative;}
.upload-zone:hover{border-color:rgba(245,244,240,0.45);}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;}
.upload-zone-icon{font-size:28px;opacity:0.25;}
.upload-zone-label{font-family:var(--mono);font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(245,244,240,0.25);}
.upload-actions{display:flex;gap:10px;}
.btn-ghost{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--white);background:transparent;padding:12px 28px;border-radius:2px;border:0.5px solid var(--dim);cursor:pointer;text-decoration:none;transition:border-color .2s;}
.btn-ghost:hover{border-color:rgba(245,244,240,0.38);}
</style>

<script>
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => { cursor.style.left=e.clientX+'px'; cursor.style.top=e.clientY+'px'; });

function seededRand(seed) { let s=seed; return ()=>{ s=(s*9301+49297)%233280; return s/233280; }; }

function generateCanvas(canvas, seed) {
  const W=canvas.width=400,H=canvas.height=300;
  const ctx=canvas.getContext('2d');
  const r=seededRand(seed);
  ctx.fillStyle=`hsl(${Math.floor(r()*360)},${Math.floor(r()*25)}%,${Math.floor(r()*7+3)})`;
  ctx.fillRect(0,0,W,H);
  const colors=['#ff3b3b','#0a84ff','#bf5af2','#ff9f0a','#30d158','#ffd60a','#ff6b6b','#5ac8fa'];
  for(let i=0;i<Math.floor(r()*5+3);i++){
    const cx=r()*W,cy=r()*H,rad=r()*90+20;
    const c=colors[Math.floor(r()*colors.length)];
    const ri=parseInt(c.slice(1,3),16),gi=parseInt(c.slice(3,5),16),bi=parseInt(c.slice(5,7),16);
    const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,rad);
    grd.addColorStop(0,`rgba(${ri},${gi},${bi},${r()*0.5+0.3})`);
    grd.addColorStop(1,`rgba(${ri},${gi},${bi},0)`);
    ctx.beginPath();ctx.arc(cx,cy,rad,0,Math.PI*2);ctx.fillStyle=grd;ctx.fill();
    for(let j=0;j<50;j++){const a=r()*Math.PI*2,d=r()*rad;ctx.beginPath();ctx.arc(cx+Math.cos(a)*d,cy+Math.sin(a)*d,r()*2+0.2,0,Math.PI*2);ctx.fillStyle=`rgba(${ri},${gi},${bi},${r()*0.4+0.1})`;ctx.fill();}
  }
}

const nomi=['Luca','Sara','Marco','Giulia','Andrea','Valentina','Lorenzo','Chiara','Matteo','Francesca','Alessandro','Elena','Davide','Martina','Simone','Giorgio','Federica','Tommaso'];
const items=Array.from({length:24},(_,i)=>{
  const r=seededRand(i*7+13);
  const d=new Date(2025,10,1+Math.floor(r()*28));
  return {id:i,seed:i*31+7,author:`${nomi[i%nomi.length]} #${247-i}`,date:d,likes:Math.floor(r()*120)+2,liked:false};
});

let displayItems=[...items].sort((a,b)=>b.likes-a.likes);
let currentSort='likes';
let currentModal=null;

function formatDate(d){return d.toLocaleDateString('it-IT',{day:'numeric',month:'long'});}

function renderGrid(){
  const grid=document.getElementById('gallery-grid');
  grid.innerHTML='';
  displayItems.forEach(item=>{
    const div=document.createElement('div');
    div.className='grid-item';
    const canvas=document.createElement('canvas');
    generateCanvas(canvas,item.seed);
    const overlay=document.createElement('div');
    overlay.className='item-overlay';
    overlay.innerHTML=`
      <div class="item-author">${item.author}</div>
      <div class="item-bottom">
        <div class="item-date">${formatDate(item.date)}</div>
        <button class="item-like ${item.liked?'liked':''}" onclick="toggleLike(event,${item.id})">
          <svg viewBox="0 0 16 16" fill="${item.liked?'#ff3b3b':'none'}" stroke="${item.liked?'#ff3b3b':'currentColor'}" stroke-width="1.3">
            <path d="M8 14s-6-3.9-6-8a4 4 0 0 1 6-3.4A4 4 0 0 1 14 6c0 4.1-6 8-6 8z"/>
          </svg>
          ${item.likes}
        </button>
      </div>`;
    div.appendChild(canvas);
    div.appendChild(overlay);
    div.addEventListener('click',e=>{if(!e.target.closest('.item-like'))openModal(item.id);});
    grid.appendChild(div);
  });
  grid.querySelectorAll('.grid-item').forEach(el=>{
    el.addEventListener('mouseenter',()=>cursor.classList.add('big'));
    el.addEventListener('mouseleave',()=>cursor.classList.remove('big'));
  });
}

function setSort(btn,sort){
  document.querySelectorAll('.sort-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentSort=sort;
  displayItems=sort==='likes'?[...items].sort((a,b)=>b.likes-a.likes):[...items].sort((a,b)=>b.date-a.date);
  renderGrid();
}

function setView(btn,cols){
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('gallery-grid').className=`gallery-grid grid-cols-${cols}`;
}

function toggleLike(e,id){
  e.stopPropagation();
  const item=items.find(i=>i.id===id);
  item.liked=!item.liked;item.likes+=item.liked?1:-1;
  if(currentSort==='likes') displayItems=[...items].sort((a,b)=>b.likes-a.likes);
  renderGrid();
}

function openModal(id){
  const item=items.find(i=>i.id===id);
  currentModal=item;
  generateCanvas(document.getElementById('modal-canvas'),item.seed);
  document.getElementById('modal-author').textContent=item.author;
  document.getElementById('modal-date').textContent=formatDate(item.date);
  document.getElementById('modal-like-count').textContent=item.likes;
  const lb=document.getElementById('modal-like-btn');
  lb.className=`modal-btn${item.liked?' liked':''}`;
  lb.innerHTML=`${item.liked?'♥':'♡'} <span id="modal-like-count">${item.likes}</span>`;
  document.getElementById('modal').classList.add('open');
}

function closeModal(){document.getElementById('modal').classList.remove('open');currentModal=null;}
function toggleModalLike(){
  if(!currentModal)return;
  currentModal.liked=!currentModal.liked;currentModal.likes+=currentModal.liked?1:-1;
  const lb=document.getElementById('modal-like-btn');
  lb.className=`modal-btn${currentModal.liked?' liked':''}`;
  lb.innerHTML=`${currentModal.liked?'♥':'♡'} <span id="modal-like-count">${currentModal.likes}</span>`;
  renderGrid();
}
function downloadModal(){
  if(!currentModal)return;
  const canvas=document.getElementById('modal-canvas');
  const a=document.createElement('a');a.href=canvas.toDataURL('image/png');a.download=`graffiti-${currentModal.id}.png`;a.click();
}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});

function openUpload(){document.getElementById('upload-panel').classList.add('open');}
function closeUpload(){document.getElementById('upload-panel').classList.remove('open');}
function handleUpload(e){
  const file=e.target.files[0];if(!file)return;
  const newItem={id:items.length,seed:Math.floor(Math.random()*9999),author:'Tu · appena aggiunto',date:new Date(),likes:0,liked:false};
  items.unshift(newItem);
  displayItems=currentSort==='likes'?[...items].sort((a,b)=>b.likes-a.likes):[...items].sort((a,b)=>b.date-a.date);
  document.getElementById('total-count').textContent=items.length;
  closeUpload();renderGrid();
  window.scrollTo({top:0,behavior:'smooth'});
}

if(new URLSearchParams(location.search).get('add')==='true')setTimeout(openUpload,400);

renderGrid();
document.querySelectorAll('a,button').forEach(el=>{
  el.addEventListener('mouseenter',()=>cursor.classList.add('big'));
  el.addEventListener('mouseleave',()=>cursor.classList.remove('big'));
});
</script>
</body>
